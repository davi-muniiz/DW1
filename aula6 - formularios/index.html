<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form action="" method="POST">
      <fieldset>
        <legend>Dados Pessoais</legend>
        <label for="nome">Nome:</label>
        <input
          type="text"
          id="nome"
          name="nome"
          placeholder="Digite seu nome"
          required
        />
        <br />
        <label for="email">Email:</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="Digite seu email"
          required
        />
        <br />
        <label for="password">Senha:</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Digite sua senha"
          required
        />
        <br />
        <label for="nascimento">Data de Nascimento:</label>
        <input type="date" id="nascimento" name="nascimento" required />
        <br />
        <label for="sexo"> </label>
        <input
          type="radio"
          id="masculino"
          name="sexo"
          value="masculino"
          required
        >Masculino</input>
        <input
          type="radio"
          id="feminino"
          name="sexo"
          value="feminino"
          required
        >Feminino</input>
      </fieldset>

      <fieldset>
        <legend>Dados do Produto:</legend>
        <label for="quantidade">Quantidade:</label>
        <input type="number" id="quantidade" name="quantidade" min="1" max="10"  />
        <br>
        <label for="cor">Cor do produto:</label><br>
        <input type="color" name="" id=""><br>
        <label for="entrega">Agendar entrega para data:</label>
        <input type="datetime-local">
        <label for="frete">Selecione o frete:</label>
        <select name="frete" id="frete">
          <option value="sedex">Sedex</option>
          <option value="pac">PAC</option>
          <option value="retirada">Retirada na loja</option>
        </select>
        <br>
        <label for="observações">Observações:</label>
        <textarea id="observações" name="observações" rows="4" cols="50" placeholder="Escreva aqui informações sobre o produto"></textarea><br><br>
        <input type="checkbox" name="termos" id="termos" required>
        <label for="termos">Aceito os termos e condições</label>
      </fieldset>
    </form>
  </body>
</html>
