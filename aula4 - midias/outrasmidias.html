<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <header>
      <h1>Outras Midias</h1>
    </header>
    <main>
      <section>
        <h2>Audio</h2>
        <audio controls src="exemplos/audio.mp3"></audio>

        <h2>Video</h2>
        <video controls src="exemplos/video.mp4" type="video/mp4" width="400px">
          Video não encontrado ou não suportado.
        </video>

        <h2>Video do Youtube (externo)</h2>
        <iframe
          width="560"
          height="315"
          src="https://www.youtube.com/embed/OvkOOxklAKE?si=BsaE7B65OuHWHiNZ"
          title="YouTube video player"
          frameborder="0"
          allow="
            accelerometer;
            autoplay;
            clipboard-write;
            encrypted-media;
            gyroscope;
            picture-in-picture;
            web-share;
          "
          referrerpolicy="strict-origin-when-cross-origin"
          allowfullscreen
        ></iframe>

        <iframe
          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d14495.49860268535!2d-48.12163617945444!3d-24.73118330854384!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x94db290b21901035%3A0xc57899344c0765c0!2sCajati%2C%20SP%2C%2011950-000!5e0!3m2!1spt-BR!2sbr!4v1773199269123!5m2!1spt-BR!2sbr"
          width="600"
          height="450"
          style="border: 0"
          allowfullscreen=""
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"
        ></iframe>
      </section>
    </main>
  </body>
</html>
